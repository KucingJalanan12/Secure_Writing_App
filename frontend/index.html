<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset="UTF-8">
        <title>Secure Writing App</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Secure Writing App</h1>

        <label class="label">
        Book Title
        <br>
        <input type="text" id="bookTitle">
        </label>

        <br><br>

        <div class="chapter empty" contenteditable="plaintext-only" id="chapterTitle" data-placeholder="Chapter 1"></div>

        <br><br>

        <div class="page empty" contenteditable="plaintext-only" id="chapterContent" data-placeholder="Start writing here..."></div>   

        <br><br>

        <button id="saveBtn" class="saver">Save Chapter</button>

        <script src="script.js" defer></script>
    </body>
</html>
